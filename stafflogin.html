<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Staff Login - Karyawan</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            background: #f0f0f0;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            width: 100%;
            height: 100%;
            position: relative;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }

        /* Loading indicator */
        .loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-family: Arial, sans-serif;
            font-size: 18px;
            color: #666;
            z-index: 1;
            display: none;
        }

        .loading.active {
            display: block;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="loading" id="loading">Memuat halaman...</div>
        <iframe 
            id="staffFrame"
            src="https://script.google.com/macros/s/AKfycbzwaAMWekj_6RQ7K_s6diEdnR8wNAjaOvHdQK75fVTbMUS25tjuJEikg_AQjPHYQcvfQQ/exec?page=Webkary"
            title="Staff Karyawan"
            sandbox="allow-scripts allow-same-origin allow-forms allow-popups"
            loading="lazy"
            onload="hideLoading()"
            onerror="showError()">
        </iframe>
    </div>

    <script>
        const loadingEl = document.getElementById('loading');
        const iframe = document.getElementById('staffFrame');

        // Show loading initially
        loadingEl.classList.add('active');

        function hideLoading() {
            loadingEl.classList.remove('active');
        }

        function showError() {
            loadingEl.innerHTML = '⚠️ Gagal memuat halaman. Silakan refresh.';
            loadingEl.classList.add('active');
        }

        // Fallback: hide loading after 10 seconds if iframe doesn't trigger onload
        setTimeout(() => {
            if (loadingEl.classList.contains('active')) {
                loadingEl.classList.remove('active');
            }
        }, 10000);

        // Handle iframe load error (some browsers don't trigger onerror)
        iframe.addEventListener('load', hideLoading);
        
        // Optional: auto-resize iframe if needed (for responsive)
        window.addEventListener('resize', () => {
            // Iframe already 100% width/height, no action needed
            // but this listener can be used for future adjustments
        });

        console.log('Staff Login Page Loaded');
    </script>
</body>
</html>
