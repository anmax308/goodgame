<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>GoodGame Member</title>
    
    <!-- Favicon (opsional, ganti dengan icon kamu) -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔒</text></svg>">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #0a0a0a;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            user-select: none;
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
        }

        /* ========== LOADING SCREEN ========== */
        #loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 0.6s ease, visibility 0.6s ease;
        }

        #loading-screen.hidden {
            opacity: 0;
            visibility: hidden;
        }

        .loader-ring {
            width: 60px;
            height: 60px;
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-top-color: #6c63ff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-bottom: 20px;
        }

        .loader-text {
            color: rgba(255, 255, 255, 0.8);
            font-size: 14px;
            letter-spacing: 2px;
            text-transform: uppercase;
            animation: pulse 1.5s ease-in-out infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
        }

        /* ========== IFRAME CONTAINER ========== */
        #app-frame {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
            z-index: 1;
            background: #fff;
        }

        /* ========== WARNING OVERLAY ========== */
        #security-warning {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            z-index: 10000;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }

        #security-warning.active {
            display: flex;
        }

        .warning-icon {
            font-size: 60px;
            margin-bottom: 20px;
            animation: shake 0.5s ease-in-out;
        }

        .warning-title {
            color: #ff4444;
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .warning-text {
            color: #ccc;
            font-size: 14px;
            text-align: center;
            max-width: 400px;
            line-height: 1.6;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }

        /* ========== WATERMARK (OPSIONAL) ========== */
        #watermark {
            position: fixed;
            bottom: 10px;
            right: 10px;
            color: rgba(255, 255, 255, 0.05);
            font-size: 10px;
            z-index: 2;
            pointer-events: none;
        }
    </style>
</head>
<body>
    
    <!-- Loading Screen -->
    <div id="loading-screen">
        <div class="loader-ring"></div>
        <div class="loader-text">Loading GoodGame...</div>
    </div>

    <!-- Security Warning -->
    <div id="security-warning">
        <div class="warning-icon">🚫</div>
        <div class="warning-title">Akses Dibatasi</div>
        <div class="warning-text">
            Alat pengembang (Developer Tools) terdeteksi.<br>
            Mohon tutup untuk melanjutkan akses.
        </div>
    </div>

    <!-- Watermark -->
    <div id="watermark">SECURED</div>

    <script>
        /**
         * ============================================
         * SECURE IFRAME LOADER v2.0
         * Protected Client Portal
         * ============================================
         */
        (function() {
            'use strict';

            // ========== CONFIGURATION ==========
            const CONFIG = {
                // GANTI dengan encrypted URL hasil generate
                ENCRYPTED_URL: 'JBAeHkdWB09MDAcYHUQbE0VACh9XVBpDEhZBQAhUCgMYGggaGzwlEQQTHiVQEhVQHj1SJQ5WXRkRaV0QIVQcDllQRxFMHmgXQHsNHhxJGUlHRh8ZBW0eAwISBzUZHAcGCh1CQBVzFD8vfl4iNn1BBhYwYjQRRVsEWgVDB1lbQBFyWhRcFw==',
                
                // Secret key untuk decrypt (jangan diganti setelah enkripsi)
                SECRET_KEY: 'Cl13ntP0rt4l!S3cur3#2024',
                
                // Timeout loading screen (ms)
                LOADING_TIMEOUT: 8000,
                
                // Interval pengecekan DevTools (ms)
                DEVTOOLS_CHECK_INTERVAL: 1000,
            };

            // ========== URL ENCRYPTION/DECRYPTION ==========
            const Crypto = {
                /**
                 * Encrypt URL dengan XOR + Base64
                 * Jalankan ini sekali untuk mendapatkan encrypted URL
                 */
                encrypt(text, key) {
                    let result = '';
                    for (let i = 0; i < text.length; i++) {
                        result += String.fromCharCode(
                            text.charCodeAt(i) ^ key.charCodeAt(i % key.length)
                        );
                    }
                    return btoa(result);
                },

                /**
                 * Decrypt URL
                 */
                decrypt(encrypted, key) {
                    try {
                        const decoded = atob(encrypted);
                        let result = '';
                        for (let i = 0; i < decoded.length; i++) {
                            result += String.fromCharCode(
                                decoded.charCodeAt(i) ^ key.charCodeAt(i % key.length)
                            );
                        }
                        return result;
                    } catch (e) {
                        console.error('Decryption failed');
                        return null;
                    }
                },

                /**
                 * Generate encrypted URL (untuk development)
                 */
                generateEncrypted() {
                    const originalUrl = 'https://script.google.com/macros/s/AKfycbwUzzk6bqsEfIRmodUNUlAIauvmExQRl2uDxzgN5Pu2f1pKgiz2Tn-0NaEAL9RPPbYa/exec?page=Client';
                    const encrypted = this.encrypt(originalUrl, CONFIG.SECRET_KEY);
                    console.log('%c🔐 ENCRYPTED URL (Copy ini):', 'color: #6c63ff; font-weight: bold;');
                    console.log('%c' + encrypted, 'background: #333; color: #0f0; padding: 10px;');
                    console.log('%c📋 Paste ke CONFIG.ENCRYPTED_URL', 'color: #ff9800;');
                    return encrypted;
                }
            };

            // ========== DEVTOOLS DETECTION (FIXED) ==========
            const DevToolsDetector = {
                isOpen: false,
                warningElement: null,
                loadingElement: null,
                lastDevtoolsState: false,
                stableCheckCount: 0,
                requiredStableChecks: 3, // Harus 3x berturut-turut terdeteksi
            
                init() {
                    this.warningElement = document.getElementById('security-warning');
                    this.loadingElement = document.getElementById('loading-screen');
                    this.startDetection();
                },
            
                startDetection() {
                    // Method 1: Window size difference (DIPERBAIKI)
                    let lastWidthDiff = 0;
                    let lastHeightDiff = 0;
                    
                    setInterval(() => {
                        const widthDiff = window.outerWidth - window.innerWidth;
                        const heightDiff = window.outerHeight - window.innerHeight;
                        
                        // Threshold lebih tinggi + harus konsisten
                        const isSuspicious = (widthDiff > 200 || heightDiff > 200) && 
                                            (Math.abs(widthDiff - lastWidthDiff) < 50) &&
                                            (Math.abs(heightDiff - lastHeightDiff) < 50);
                        
                        lastWidthDiff = widthDiff;
                        lastHeightDiff = heightDiff;
                        
                        if (isSuspicious) {
                            this.stableCheckCount++;
                            if (this.stableCheckCount >= this.requiredStableChecks) {
                                this.triggerWarning();
                            }
                        } else {
                            this.stableCheckCount = Math.max(0, this.stableCheckCount - 1);
                            if (this.stableCheckCount === 0) {
                                this.clearWarning();
                            }
                        }
                    }, CONFIG.DEVTOOLS_CHECK_INTERVAL);
            
                    // Method 2: Debugger timing (DIPERBAIKI)
                    let debuggerTriggerCount = 0;
                    setInterval(() => {
                        const start = performance.now();
                        debugger;
                        const end = performance.now();
                        
                        if (end - start > 100) {
                            debuggerTriggerCount++;
                            if (debuggerTriggerCount >= 3) {
                                this.triggerWarning();
                            }
                        } else {
                            debuggerTriggerCount = Math.max(0, debuggerTriggerCount - 1);
                            if (debuggerTriggerCount === 0 && this.stableCheckCount === 0) {
                                this.clearWarning();
                            }
                        }
                    }, 2000);
                },
            
                triggerWarning() {
                    if (!this.isOpen) {
                        this.isOpen = true;
                        this.warningElement.classList.add('active');
                        // JANGAN sembunyikan loading screen saat warning
                        // this.loadingElement.classList.add('hidden'); // <-- HAPUS INI
                    }
                },
            
                clearWarning() {
                    if (this.isOpen) {
                        this.isOpen = false;
                        this.warningElement.classList.remove('active');
                        // JANGAN tampilkan loading screen lagi
                        // this.loadingElement.classList.remove('hidden'); // <-- HAPUS INI
                    }
                }
            };

            // ========== EVENT BLOCKERS ==========
            const EventBlocker = {
                init() {
                    this.blockContextMenu();
                    this.blockShortcuts();
                    this.blockDragDrop();
                    this.blockTextSelection();
                },

                blockContextMenu() {
                    document.addEventListener('contextmenu', (e) => {
                        e.preventDefault();
                        e.stopPropagation();
                        return false;
                    }, true);
                },

                blockShortcuts() {
                    document.addEventListener('keydown', (e) => {
                        const blockedKeys = {
                            123: 'F12',
                            73: 'Ctrl+Shift+I',  // I
                            74: 'Ctrl+Shift+J',  // J
                            67: 'Ctrl+Shift+C',  // C
                            85: 'Ctrl+U',        // U
                            83: 'Ctrl+S',        // S
                        };

                        // F12
                        if (e.keyCode === 123) {
                            e.preventDefault();
                            return false;
                        }

                        // Ctrl+Shift combinations
                        if (e.ctrlKey && e.shiftKey && blockedKeys[e.keyCode]) {
                            e.preventDefault();
                            return false;
                        }

                        // Ctrl+U (View Source)
                        if (e.ctrlKey && e.keyCode === 85) {
                            e.preventDefault();
                            return false;
                        }

                        // Ctrl+S (Save)
                        if (e.ctrlKey && e.keyCode === 83) {
                            e.preventDefault();
                            return false;
                        }
                    }, true);
                },

                blockDragDrop() {
                    document.addEventListener('dragstart', (e) => e.preventDefault());
                    document.addEventListener('drop', (e) => e.preventDefault());
                },

                blockTextSelection() {
                    document.addEventListener('selectstart', (e) => {
                        // Izinkan seleksi di dalam iframe saja
                        if (e.target.tagName !== 'IFRAME') {
                            e.preventDefault();
                        }
                    });
                }
            };

            // ========== CONSOLE PROTECTION ==========
            const ConsoleProtector = {
                init() {
                    this.overrideConsoleMethods();
                    this.clearConsolePeriodically();
                    this.warnOnConsole();
                },

                overrideConsoleMethods() {
                    const protectedUrls = ['script.google.com', 'macros'];
                    
                    // Simpan referensi asli
                    const originalLog = console.log;
                    const originalWarn = console.warn;
                    const originalError = console.error;

                    // Override log
                    console.log = function(...args) {
                        const filtered = args.map(arg => {
                            if (typeof arg === 'string') {
                                if (protectedUrls.some(url => arg.includes(url))) {
                                    return '[PROTECTED]';
                                }
                            }
                            return arg;
                        });
                        originalLog.apply(console, filtered);
                    };

                    // Override warn  
                    console.warn = function(...args) {
                        const filtered = args.map(arg => {
                            if (typeof arg === 'string') {
                                if (protectedUrls.some(url => arg.includes(url))) {
                                    return '[PROTECTED]';
                                }
                            }
                            return arg;
                        });
                        originalWarn.apply(console, filtered);
                    };

                    // Override error
                    console.error = function(...args) {
                        const filtered = args.map(arg => {
                            if (typeof arg === 'string') {
                                if (protectedUrls.some(url => arg.includes(url))) {
                                    return '[ERROR PROTECTED]';
                                }
                            }
                            return arg;
                        });
                        originalError.apply(console, filtered);
                    };
                },

                clearConsolePeriodically() {
                    setInterval(() => {
                        if (console.clear && typeof console.clear === 'function') {
                            console.clear();
                        }
                    }, 3000);
                },

                warnOnConsole() {
                    console.log('%c⚠️ STOP!', 'color: red; font-size: 30px; font-weight: bold;');
                    console.log('%cIni adalah area terproteksi.', 'color: orange; font-size: 16px;');
                    console.log('%cSocial engineering? Silakan coba lagi 😉', 'color: #888;');
                }
            };

            // ========== IFRAME MANAGER ==========
            const IframeManager = {
                iframe: null,
                targetUrl: null,

                init(url) {
                    this.targetUrl = url;
                    this.createIframe();
                    this.setupObserver();
                    this.handleLoad();
                },

                createIframe() {
                    this.iframe = document.createElement('iframe');
                    
                    // Atribut keamanan
                    this.iframe.id = 'app-frame';
                    this.iframe.setAttribute('sandbox', 'allow-scripts allow-same-origin allow-forms allow-popups allow-top-navigation');
                    this.iframe.setAttribute('referrerpolicy', 'no-referrer');
                    this.iframe.setAttribute('loading', 'eager');
                    this.iframe.setAttribute('title', 'Client Portal');
                    
                    // Set src (ini yang akan diproteksi)
                    this.iframe.src = this.targetUrl;
                    
                    // Tambahkan ke DOM
                    document.body.appendChild(this.iframe);
                },

                setupObserver() {
                    // Proteksi perubahan src via MutationObserver
                    const observer = new MutationObserver((mutations) => {
                        mutations.forEach((mutation) => {
                            if (mutation.type === 'attributes' && 
                                mutation.attributeName === 'src' &&
                                this.iframe.src !== this.targetUrl) {
                                // Kembalikan ke URL asli
                                this.iframe.src = this.targetUrl;
                            }
                        });
                    });

                    observer.observe(this.iframe, {
                        attributes: true,
                        attributeFilter: ['src']
                    });

                    // Proteksi akses via Object.defineProperty
                    try {
                        Object.defineProperty(this.iframe, 'src', {
                            get: () => this.targetUrl,
                            set: (value) => {
                                if (value !== this.targetUrl) {
                                    console.warn('Unauthorized src modification blocked');
                                    return;
                                }
                                this.targetUrl = value;
                            },
                            configurable: false
                        });
                    } catch (e) {
                        // Fallback jika defineProperty gagal
                        console.debug('Object.defineProperty not available');
                    }
                },

                handleLoad() {
                    this.iframe.addEventListener('load', () => {
                        console.log('✅ Iframe loaded successfully');
                        
                        // Sembunyikan loading screen
                        setTimeout(() => {
                            const loadingScreen = document.getElementById('loading-screen');
                            if (loadingScreen) {
                                loadingScreen.classList.add('hidden');
                            }
                        }, 500);
                
                        this.protectContentWindow();
                    });
                
                    // TAMBAHKAN: Error handler
                    this.iframe.addEventListener('error', (e) => {
                        console.error('❌ Iframe failed to load');
                        showError('Gagal memuat halaman. URL mungkin memblokir iframe.');
                    });
                
                    // TAMBAHKAN: Timeout fallback
                    setTimeout(() => {
                        const loadingScreen = document.getElementById('loading-screen');
                        if (loadingScreen && !loadingScreen.classList.contains('hidden')) {
                            console.warn('⚠️ Loading timeout - kemungkinan diblokir');
                            loadingScreen.innerHTML = `
                                <div style="text-align: center; color: white;">
                                    <div style="font-size: 50px; margin-bottom: 20px;">⏳</div>
                                    <div style="font-size: 18px; color: #ff9800;">Halaman terlalu lama dimuat</div>
                                    <div style="font-size: 12px; color: #888; margin-top: 20px;">
                                        Mungkin diblokir oleh Google.<br>
                                        Coba buka langsung: <a href="${this.targetUrl}" target="_blank" style="color: #6c63ff;">Klik di sini</a>
                                    </div>
                                </div>
                            `;
                        }
                    }, CONFIG.LOADING_TIMEOUT);
                }

                protectContentWindow() {
                    try {
                        const contentWindow = this.iframe.contentWindow;
                        if (contentWindow) {
                            // Override location
                            Object.defineProperty(contentWindow, 'location', {
                                get: () => ({ href: 'about:blank', hostname: '' }),
                                configurable: false
                            });
                        }
                    } catch (e) {
                        // Cross-origin - tidak bisa diakses (ini bagus)
                        console.debug('Cross-origin protection active');
                    }
                },

                // Cleanup URL dari memori
                cleanupUrl() {
                    setTimeout(() => {
                        this.targetUrl = null;
                        if (CONFIG.ENCRYPTED_URL) {
                            // Hapus dari config
                            delete CONFIG.ENCRYPTED_URL;
                        }
                    }, 2000);
                }
            };

            // ========== MAIN EXECUTION ==========
            function main() {
                // Inisialisasi proteksi
                EventBlocker.init();
                ConsoleProtector.init();
                DevToolsDetector.init();

                // Dapatkan URL
                let targetUrl;
                
                // Mode 1: Gunakan encrypted URL (PRODUCTION)
                if (CONFIG.ENCRYPTED_URL && CONFIG.ENCRYPTED_URL !== 'PASTE_ENCRYPTED_URL_HERE') {
                    targetUrl = Crypto.decrypt(CONFIG.ENCRYPTED_URL, CONFIG.SECRET_KEY);
                    
                    if (!targetUrl) {
                        showError('Gagal mendekripsi URL. Hubungi administrator.');
                        return;
                    }
                } 
                // Mode 2: Development mode (auto-encrypt)
                else {
                    console.warn('⚠️ DEVELOPMENT MODE - Generate encrypted URL untuk production');
                    const encrypted = Crypto.generateEncrypted();
                    
                    // Gunakan URL langsung untuk development
                    targetUrl = 'https://script.google.com/macros/s/AKfycbwUzzk6bqsEfIRmodUNUlAIauvmExQRl2uDxzgN5Pu2f1pKgiz2Tn-0NaEAL9RPPbYa/exec?page=Client';
                    
                    // Tampilkan instruksi
                    console.log('%c📝 LANGKAH DEPLOYMENT:', 'color: #ff9800; font-size: 16px;');
                    console.log('1. Copy encrypted URL di atas');
                    console.log('2. Buka file client.html');
                    console.log('3. Cari CONFIG.ENCRYPTED_URL');
                    console.log('4. Paste encrypted URL ke dalam tanda kutip');
                    console.log('5. Simpan dan deploy ke GitHub Pages');
                }

                // Buat iframe dengan URL
                if (targetUrl) {
                    IframeManager.init(targetUrl);
                    
                    // Cleanup URL dari memori setelah beberapa detik
                    IframeManager.cleanupUrl();
                    
                    // Hapus referensi URL dari scope ini
                    targetUrl = null;
                } else {
                    showError('URL tidak valid. Tidak dapat memuat aplikasi.');
                }
            }

            // ========== ERROR HANDLER ==========
            function showError(message) {
                const loadingScreen = document.getElementById('loading-screen');
                if (loadingScreen) {
                    loadingScreen.innerHTML = `
                        <div style="text-align: center; color: white;">
                            <div style="font-size: 50px; margin-bottom: 20px;">⚠️</div>
                            <div style="font-size: 18px; color: #ff4444;">${message}</div>
                            <div style="font-size: 12px; color: #888; margin-top: 20px;">
                                Silakan hubungi administrator
                            </div>
                        </div>
                    `;
                }
            }

            // ========== STARTUP ==========
            if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', main);
            } else {
                main();
            }

            // ========== ADDITIONAL PROTECTION ==========
            // Deteksi jika script dijalankan di luar browser normal
            if (navigator.webdriver) {
                document.body.innerHTML = '<h1 style="color:red;text-align:center;margin-top:100px;">⛔ Automated access detected</h1>';
                throw new Error('Access denied');
            }

            // Proteksi window.name
            Object.defineProperty(window, 'name', {
                get: () => '',
                set: () => {},
                configurable: false
            });

            // Cegah framing (opsional)
            if (window.top !== window.self) {
                window.top.location = window.self.location;
            }

        })();
    </script>
</body>
</html>
