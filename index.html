<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GoodGame Billiard</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: Arial, sans-serif; background: #0f1f35; }

    .tab-bar {
      display: flex;
      background: #1e3a5f;
      padding: 0 10px;
      overflow-x: auto;
      align-items: flex-end;
      gap: 4px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.4);
    }

    .tab-btn {
      padding: 11px 22px;
      color: rgba(255,255,255,0.6);
      background: transparent;
      border: none;
      border-bottom: 3px solid transparent;
      border-radius: 6px 6px 0 0;
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
      white-space: nowrap;
      transition: all 0.2s;
    }

    .tab-btn:hover {
      color: rgba(255,255,255,0.9);
      background: rgba(255,255,255,0.08);
    }

    .tab-btn.active {
      color: #ffffff;
      background: rgba(255,255,255,0.12);
      border-bottom: 3px solid #5ba3f5;
    }

    .loading-bar {
      height: 3px;
      width: 0%;
      background: #5ba3f5;
      transition: width 0.1s;
    }

    .loading-bar.running {
      animation: loadAnim 1.8s ease-in-out infinite;
    }

    @keyframes loadAnim {
      0%   { width: 0%;   opacity: 1; }
      70%  { width: 85%;  opacity: 1; }
      100% { width: 100%; opacity: 0; }
    }

    #main-frame {
      display: block;
      width: 100%;
      height: calc(100vh - 49px);
      border: none;
    }
  </style>
</head>
<body>

<div class="tab-bar">
  <button class="tab-btn active"
    onclick="switchTab(this, 'https://script.google.com/macros/s/AKfycbxExCm3bnQHJhwmt0Blezj413TGPiqH46Hi17Y0LYuWkmMzShqSc8x4iiJ0J9FkL8smhw/exec')">
    🎱 Panel
  </button>
  <button class="tab-btn"
    onclick="switchTab(this, 'https://script.google.com/macros/s/AKfycbxc5_W2VLcGxORb7bYPu4_-amQM4KHZ0BWvFmaH3eXoW0sk67i4e5EYHvWMlVKd8E4X/exec?page=admin')">
    ⏱ Break
  </button>
  <button class="tab-btn"
    onclick="switchTab(this, 'https://script.google.com/macros/s/AKfycbx1kEoApR5cR2FXGNC-1vwyGfKN3DcNOITgzsqYvIZDMP1cBVYEenuH0f64zCZk-0Rx/exec')">
    📦 Stok Bar
  </button>
</div>

<div class="loading-bar" id="loadBar"></div>

<iframe
  id="main-frame"
  src="URL_DEPLOY_PANEL"
  allowfullscreen>
</iframe>

<script>
  const frame = document.getElementById('main-frame');
  const loadBar = document.getElementById('loadBar');

  function switchTab(btn, url) {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    loadBar.classList.add('running');
    frame.src = url;
  }

  frame.addEventListener('load', () => {
    loadBar.classList.remove('running');
    loadBar.style.width = '0%';
  });
</script>

</body>
</html>
