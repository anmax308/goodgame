<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GoodGame Billiard</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; font-family: Arial, sans-serif; background: #0f1f35; }

    #main-frame {
      display: block;
      position: fixed;
      top: 0; left: 0;
      width: 100%;
      height: 100%;
      border: none;
    }

    /* Khusus tab Bar Order, iframe dibuat sedikit lebih kecil
       supaya nav fixed di dalam tidak terpotong browser chrome */
    #main-frame.mode-bar {
      height: calc(100% - 60px);
      margin-bottom: 60px;
    }

    #menu-trigger {
      position: fixed;
      top: 12px;
      right: 12px;
      z-index: 200;
      width: 38px;
      height: 38px;
      background: rgba(30, 58, 95, 0.85);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 8px;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 5px;
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      transition: background 0.2s;
    }
    #menu-trigger:hover { background: rgba(37, 99, 168, 0.9); }
    #menu-trigger span {
      display: block;
      width: 18px;
      height: 2px;
      background: rgba(255,255,255,0.85);
      border-radius: 2px;
    }

    #sidebar {
      position: fixed;
      top: 0;
      right: -260px;
      width: 240px;
      height: 100%;
      background: #1e3a5f;
      z-index: 190;
      display: flex;
      flex-direction: column;
      box-shadow: -4px 0 24px rgba(0,0,0,0.5);
      transition: right 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      border-left: 1px solid rgba(255,255,255,0.08);
    }
    #sidebar.open { right: 0; }

    .sidebar-header {
      padding: 16px 16px 12px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }
    .sidebar-header span {
      color: rgba(255,255,255,0.5);
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 1px;
      text-transform: uppercase;
    }
    .sidebar-header button {
      background: none; border: none;
      color: rgba(255,255,255,0.35);
      cursor: pointer; font-size: 18px; line-height: 1;
      padding: 2px 4px; border-radius: 4px; transition: color 0.2s;
    }
    .sidebar-header button:hover { color: rgba(255,255,255,0.8); }

    .tab-list { flex: 1; overflow-y: auto; padding: 10px 8px; }
    .tab-list::-webkit-scrollbar { width: 4px; }
    .tab-list::-webkit-scrollbar-track { background: transparent; }
    .tab-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 2px; }

    .tab-item {
      display: flex; align-items: center;
      padding: 10px 12px; border-radius: 8px; cursor: pointer;
      color: rgba(255,255,255,0.65); font-size: 13px; font-weight: 500;
      transition: all 0.15s; margin-bottom: 2px;
      border: 1px solid transparent;
    }
    .tab-item:hover { background: rgba(255,255,255,0.08); color: #fff; }
    .tab-item.active { background: rgba(91,163,245,0.15); color: #fff; border-color: rgba(91,163,245,0.3); }
    .tab-item .tab-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: rgba(255,255,255,0.2);
      margin-right: 10px; flex-shrink: 0; transition: background 0.15s;
    }
    .tab-item.active .tab-dot { background: #5ba3f5; }

    .sidebar-footer { padding: 10px 8px; border-top: 1px solid rgba(255,255,255,0.08); flex-shrink: 0; }
    .btn-setting {
      width: 100%; padding: 9px 12px;
      background: transparent; border: 1px solid rgba(255,255,255,0.1);
      border-radius: 8px; color: rgba(255,255,255,0.5); font-size: 12px;
      cursor: pointer; display: flex; align-items: center; gap: 8px; transition: all 0.2s;
    }
    .btn-setting:hover { background: rgba(255,255,255,0.07); color: rgba(255,255,255,0.8); }

    #sidebar-overlay { display: none; position: fixed; inset: 0; z-index: 180; }
    #sidebar-overlay.show { display: block; }

    .loading-bar {
      position: fixed; top: 0; left: 0;
      height: 3px; width: 0%; background: #5ba3f5; z-index: 300;
    }
    .loading-bar.running { animation: loadAnim 1.8s ease-in-out infinite; }
    @keyframes loadAnim {
      0%   { width: 0%;   opacity: 1; }
      70%  { width: 85%;  opacity: 1; }
      100% { width: 100%; opacity: 0; }
    }

    .overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.6); z-index: 400;
      align-items: center; justify-content: center;
    }
    .overlay.show { display: flex; }
    .modal {
      background: #1a2e47; border-radius: 12px; padding: 24px;
      width: 92%; max-width: 420px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
      border: 1px solid rgba(255,255,255,0.1);
    }
    .modal h2 { color: #fff; font-size: 15px; font-weight: 600; margin-bottom: 18px; }
    .modal label { display: block; color: rgba(255,255,255,0.6); font-size: 12px; margin-bottom: 5px; margin-top: 14px; }
    .modal label:first-of-type { margin-top: 0; }
    .modal input {
      width: 100%; padding: 9px 12px;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 7px; color: #fff; font-size: 13px; outline: none; transition: border 0.2s;
    }
    .modal input:focus { border-color: #5ba3f5; }
    .modal input::placeholder { color: rgba(255,255,255,0.3); }
    .modal-actions { display: flex; gap: 10px; margin-top: 20px; justify-content: flex-end; }
    .btn-cancel {
      padding: 8px 18px; background: rgba(255,255,255,0.07);
      color: rgba(255,255,255,0.7); border: 1px solid rgba(255,255,255,0.15);
      border-radius: 7px; cursor: pointer; font-size: 13px; transition: all 0.2s;
    }
    .btn-cancel:hover { background: rgba(255,255,255,0.13); }
    .btn-ok {
      padding: 8px 22px; background: #2563a8; color: #fff;
      border: none; border-radius: 7px; cursor: pointer; font-size: 13px;
      font-weight: 600; transition: background 0.2s;
    }
    .btn-ok:hover { background: #3578c8; }

    .setting-panel {
      background: #1a2e47; border-radius: 12px; padding: 24px;
      width: 92%; max-width: 480px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
      border: 1px solid rgba(255,255,255,0.1);
      max-height: 85vh; overflow-y: auto;
    }
    .setting-panel h2 { color: #fff; font-size: 15px; font-weight: 600; margin-bottom: 6px; }
    .setting-panel p { color: rgba(255,255,255,0.4); font-size: 12px; margin-bottom: 18px; }
    .tab-list-item {
      display: flex; align-items: center; gap: 10px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 8px; padding: 10px 12px; margin-bottom: 8px;
    }
    .tab-list-item .drag-handle { color: rgba(255,255,255,0.3); cursor: grab; font-size: 16px; user-select: none; flex-shrink: 0; }
    .tab-list-item .drag-handle:active { cursor: grabbing; }
    .tab-list-item .tab-info { flex: 1; min-width: 0; }
    .tab-list-item .tab-info .tab-name { color: #fff; font-size: 13px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .tab-list-item .tab-info .tab-url { color: rgba(255,255,255,0.35); font-size: 11px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .tab-list-item .item-actions { display: flex; gap: 6px; flex-shrink: 0; }
    .btn-edit-tab, .btn-delete-tab { padding: 5px 10px; border-radius: 6px; border: none; cursor: pointer; font-size: 12px; font-weight: 500; transition: all 0.2s; }
    .btn-edit-tab { background: rgba(91,163,245,0.2); color: #5ba3f5; }
    .btn-edit-tab:hover { background: rgba(91,163,245,0.35); }
    .btn-delete-tab { background: rgba(220,80,80,0.2); color: #f07070; }
    .btn-delete-tab:hover { background: rgba(220,80,80,0.35); }
    .btn-add-tab {
      width: 100%; margin-top: 12px; padding: 10px;
      background: rgba(37,99,168,0.3); color: #5ba3f5;
      border: 1px dashed rgba(91,163,245,0.4);
      border-radius: 8px; cursor: pointer; font-size: 13px; font-weight: 500; transition: all 0.2s;
    }
    .btn-add-tab:hover { background: rgba(37,99,168,0.5); }
    .setting-close {
      width: 100%; margin-top: 16px; padding: 9px;
      background: rgba(255,255,255,0.07); color: rgba(255,255,255,0.6);
      border: 1px solid rgba(255,255,255,0.13);
      border-radius: 8px; cursor: pointer; font-size: 13px; transition: all 0.2s;
    }
    .setting-close:hover { background: rgba(255,255,255,0.13); }
    .tab-list-item.dragging { opacity: 0.4; }
    .tab-list-item.drag-over { border-color: #5ba3f5; background: rgba(91,163,245,0.1); }
  </style>
</head>
<body>

<div class="loading-bar" id="loadBar"></div>
<iframe id="main-frame" src="" allow="fullscreen"></iframe>
<div id="menu-trigger" onclick="toggleSidebar()">
  <span></span><span></span><span></span>
</div>
<div id="sidebar-overlay" onclick="closeSidebar()"></div>

<div id="sidebar">
  <div class="sidebar-header">
    <span>Menu</span>
    <button onclick="closeSidebar()">✕</button>
  </div>
  <div class="tab-list" id="sidebarTabList"></div>
  <div class="sidebar-footer">
    <button class="btn-setting" onclick="openSetting()">⚙️ <span>Pengaturan Tab</span></button>
  </div>
</div>

<div class="overlay" id="modalOverlay">
  <div class="modal">
    <h2 id="modalTitle">Tambah Tab Baru</h2>
    <label>Nama Tab</label>
    <input type="text" id="inputNama" placeholder="contoh: 🎱 Panel" />
    <label>Alamat URL</label>
    <input type="text" id="inputUrl" placeholder="https://script.google.com/..." />
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">Batal</button>
      <button class="btn-ok" onclick="submitModal()">OK</button>
    </div>
  </div>
</div>

<div class="overlay" id="settingOverlay">
  <div class="setting-panel">
    <h2>⚙️ Pengaturan Tab</h2>
    <p>Seret ☰ untuk mengubah urutan tab</p>
    <div id="tabListContainer"></div>
    <button class="btn-add-tab" onclick="openAddModal()">+ Tambah Tab Baru</button>
    <button class="setting-close" onclick="closeSetting()">Tutup</button>
  </div>
</div>

<script>
  // Daftar tab yang punya nav bar bawah fixed — iframe akan dikecilkan
  // supaya nav bar tidak terpotong. Tambahkan URL lain di sini jika perlu.
  const BOTTOM_NAV_URLS = [
    'AKfycbx1kEoApR5cR2FXGNC-1vwyGfKN3DcNOITgzsqYvIZDMP1cBVYEenuH0f64zCZk-0Rx'
  ];

  const DEFAULT_TABS = [
    { nama: '🎱 Panel', url: 'https://script.google.com/macros/s/AKfycbxExCm3bnQHJhwmt0Blezj413TGPiqH46Hi17Y0LYuWkmMzShqSc8x4iiJ0J9FkL8smhw/exec' },
    { nama: '⏱ Break', url: 'https://script.google.com/macros/s/AKfycbxc5_W2VLcGxORb7bYPu4_-amQM4KHZ0BWvFmaH3eXoW0sk67i4e5EYHvWMlVKd8E4X/exec?page=admin' },
    { nama: '📦 Stok Bar', url: 'https://script.google.com/macros/s/AKfycbx1kEoApR5cR2FXGNC-1vwyGfKN3DcNOITgzsqYvIZDMP1cBVYEenuH0f64zCZk-0Rx/exec' }
  ];

  let tabs = [], activeIndex = 0, editIndex = -1, dragSrcIndex = -1;
  const frame = document.getElementById('main-frame');
  const loadBar = document.getElementById('loadBar');
  const sidebar = document.getElementById('sidebar');
  const sidebarOverlay = document.getElementById('sidebar-overlay');

  function hasBottomNav(url) {
    return BOTTOM_NAV_URLS.some(id => url.includes(id));
  }

  function loadTabs() {
    try {
      const saved = localStorage.getItem('gg_tabs');
      tabs = saved ? JSON.parse(saved) : JSON.parse(JSON.stringify(DEFAULT_TABS));
    } catch(e) { tabs = JSON.parse(JSON.stringify(DEFAULT_TABS)); }
  }
  function saveTabs() { localStorage.setItem('gg_tabs', JSON.stringify(tabs)); }

  function renderSidebarTabs() {
    const list = document.getElementById('sidebarTabList');
    list.innerHTML = '';
    tabs.forEach((tab, i) => {
      const item = document.createElement('div');
      item.className = 'tab-item' + (i === activeIndex ? ' active' : '');
      item.innerHTML = `<span class="tab-dot"></span>${escHtml(tab.nama)}`;
      item.onclick = () => { switchTab(i); closeSidebar(); };
      list.appendChild(item);
    });
  }

  function switchTab(index) {
    activeIndex = index;
    renderSidebarTabs();
    loadBar.classList.add('running');
    const url = tabs[index].url;
    // Kalau tab ini punya nav bar bawah fixed, kecilkan iframe
    if (hasBottomNav(url)) {
      frame.classList.add('mode-bar');
    } else {
      frame.classList.remove('mode-bar');
    }
    frame.src = url;
  }

  frame.addEventListener('load', () => {
    loadBar.classList.remove('running');
    loadBar.style.width = '0%';
  });

  function toggleSidebar() { sidebar.classList.contains('open') ? closeSidebar() : openSidebar(); }
  function openSidebar() { sidebar.classList.add('open'); sidebarOverlay.classList.add('show'); }
  function closeSidebar() { sidebar.classList.remove('open'); sidebarOverlay.classList.remove('show'); }

  function openAddModal() {
    editIndex = -1;
    document.getElementById('modalTitle').textContent = 'Tambah Tab Baru';
    document.getElementById('inputNama').value = '';
    document.getElementById('inputUrl').value = '';
    document.getElementById('settingOverlay').classList.remove('show');
    document.getElementById('modalOverlay').classList.add('show');
    document.getElementById('inputNama').focus();
  }
  function openEditModal(i) {
    editIndex = i;
    document.getElementById('modalTitle').textContent = 'Edit Tab';
    document.getElementById('inputNama').value = tabs[i].nama;
    document.getElementById('inputUrl').value = tabs[i].url;
    document.getElementById('settingOverlay').classList.remove('show');
    document.getElementById('modalOverlay').classList.add('show');
    document.getElementById('inputNama').focus();
  }
  function closeModal() { document.getElementById('modalOverlay').classList.remove('show'); editIndex = -1; }
  function submitModal() {
    const nama = document.getElementById('inputNama').value.trim();
    const url  = document.getElementById('inputUrl').value.trim();
    if (!nama || !url) { alert('Nama dan URL wajib diisi.'); return; }
    if (editIndex === -1) { tabs.push({ nama, url }); activeIndex = tabs.length - 1; }
    else { tabs[editIndex] = { nama, url }; if (activeIndex === editIndex) frame.src = url; }
    saveTabs(); renderSidebarTabs(); closeModal();
    if (editIndex === -1) switchTab(activeIndex);
  }

  function openSetting() { closeSidebar(); renderTabList(); document.getElementById('settingOverlay').classList.add('show'); }
  function closeSetting() { document.getElementById('settingOverlay').classList.remove('show'); }
  function renderTabList() {
    const container = document.getElementById('tabListContainer');
    container.innerHTML = '';
    tabs.forEach((tab, i) => {
      const item = document.createElement('div');
      item.className = 'tab-list-item'; item.draggable = true; item.dataset.index = i;
      item.innerHTML = `
        <span class="drag-handle">☰</span>
        <div class="tab-info">
          <div class="tab-name">${escHtml(tab.nama)}</div>
          <div class="tab-url">${escHtml(tab.url)}</div>
        </div>
        <div class="item-actions">
          <button class="btn-edit-tab" onclick="openEditModal(${i})">Edit</button>
          <button class="btn-delete-tab" onclick="deleteTab(${i})">Hapus</button>
        </div>`;
      item.addEventListener('dragstart', e => { dragSrcIndex = i; setTimeout(() => item.classList.add('dragging'), 0); e.dataTransfer.effectAllowed = 'move'; });
      item.addEventListener('dragend', () => { item.classList.remove('dragging'); document.querySelectorAll('.tab-list-item').forEach(el => el.classList.remove('drag-over')); });
      item.addEventListener('dragover', e => { e.preventDefault(); document.querySelectorAll('.tab-list-item').forEach(el => el.classList.remove('drag-over')); item.classList.add('drag-over'); });
      item.addEventListener('drop', e => {
        e.preventDefault(); if (dragSrcIndex === i) return;
        const moved = tabs.splice(dragSrcIndex, 1)[0]; tabs.splice(i, 0, moved);
        if (activeIndex === dragSrcIndex) activeIndex = i;
        else if (dragSrcIndex < activeIndex && i >= activeIndex) activeIndex--;
        else if (dragSrcIndex > activeIndex && i <= activeIndex) activeIndex++;
        saveTabs(); renderSidebarTabs(); renderTabList();
      });
      container.appendChild(item);
    });
  }
  function deleteTab(i) {
    if (!confirm(`Hapus tab "${tabs[i].nama}"?`)) return;
    tabs.splice(i, 1);
    if (activeIndex >= tabs.length) activeIndex = tabs.length - 1;
    saveTabs(); renderSidebarTabs();
    if (tabs.length > 0) switchTab(activeIndex);
    renderTabList();
  }
  function escHtml(str) { return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

  document.getElementById('inputUrl').addEventListener('keydown', e => { if (e.key === 'Enter') submitModal(); });
  document.getElementById('modalOverlay').addEventListener('click', function(e) { if (e.target === this) closeModal(); });
  document.getElementById('settingOverlay').addEventListener('click', function(e) { if (e.target === this) closeSetting(); });

  loadTabs();
  renderSidebarTabs();
  if (tabs.length > 0) switchTab(0);
</script>
</body>
</html>
